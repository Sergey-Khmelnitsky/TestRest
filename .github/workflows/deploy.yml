# Опциональный деплой — только ручной запуск.
# Для тестового задания сервер неизвестен: без секретов workflow завершится
# успешно с пояснением. CI (.github/workflows/ci.yml) — основная проверка.

name: Deploy (optional)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy configuration
        id: config
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_SSH_KEY" ] || [ -z "$DEPLOY_PATH" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "## Деплой не настроен" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Для тестового задания это ожидаемо: целевой сервер заранее неизвестен." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Проверка решения выполняется через **CI** (тесты, Pint, сборка фронтенда)." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Чтобы задеплоить на свой сервер, добавьте секреты \`DEPLOY_HOST\`, \`DEPLOY_USER\`, \`DEPLOY_SSH_KEY\`, \`DEPLOY_PATH\` и перезапустите workflow." >> "$GITHUB_STEP_SUMMARY"
            echo "Deploy secrets are not configured — skipping (expected for a test assignment)."
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        if: steps.config.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT != '' && env.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"

            git fetch origin main
            git reset --hard origin/main

            composer install --no-dev --optimize-autoloader --no-interaction

            if [ -f package.json ]; then
              npm ci --ignore-scripts
              npm run build
            fi

            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            if php artisan list | grep -q "octane:reload"; then
              php artisan octane:reload || true
            fi

            php artisan queue:restart || true
